version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet-runtime:
        patterns:
          - 'Microsoft.*'
          - 'Aspire.*'
      test-tooling:
        dependency-type: development
        patterns:
          - 'Microsoft.NET.Test.Sdk'
          - 'xunit*'
          - 'coverlet.*'
