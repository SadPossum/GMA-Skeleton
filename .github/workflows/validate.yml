name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout skeleton
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/bootstrap-source-roots.ps1 -Force

      - name: Restore
        run: dotnet restore GMA-Skeleton.slnx

      - name: Build
        run: dotnet build GMA-Skeleton.slnx --no-restore -m:1

      - name: Test
        run: dotnet test GMA-Skeleton.slnx --no-build --logger "console;verbosity=minimal"
