name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

jobs:
  fast:
    name: Fast validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout skeleton
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Check GMA submodule dev heads
        shell: pwsh
        run: ./eng/check-submodule-dev-heads.ps1

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/gma-bootstrap.ps1 -SourceLayout GmaSubmodules -Force

      - name: Verify
        shell: pwsh
        run: ./eng/verify.ps1
