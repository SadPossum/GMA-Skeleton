name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout skeleton
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Check GMA submodule dev heads
        shell: pwsh
        run: ./eng/check-submodule-dev-heads.ps1

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/gma-bootstrap.ps1 -SourceLayout GmaSubmodules -Force

      - name: Restore
        shell: pwsh
        run: ./eng/restore.ps1

      - name: Build
        shell: pwsh
        run: ./eng/build.ps1 -NoRestore

      - name: Test
        shell: pwsh
        run: ./eng/test-fast.ps1 -NoBuild
