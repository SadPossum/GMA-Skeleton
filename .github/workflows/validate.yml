name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: ./eng/restore.ps1

      - name: Build
        run: dotnet build GenericModularApi.slnx --no-restore -m:1

      - name: Test non-Docker suite
        shell: pwsh
        run: ./eng/test-fast.ps1 -NoBuild
