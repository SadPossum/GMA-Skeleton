name: Docker Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-tests-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  GMA_REQUIRE_DOCKER_TESTS: 'true'

jobs:
  docker:
    name: Docker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout skeleton
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Show Docker version
        shell: pwsh
        run: docker version

      - name: Check GMA submodule dev heads
        shell: pwsh
        run: ./eng/check-submodule-dev-heads.ps1

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/gma-bootstrap.ps1 -SourceLayout GmaSubmodules -Force

      - name: Restore
        shell: pwsh
        run: ./eng/restore.ps1

      - name: Build
        shell: pwsh
        run: ./eng/build.ps1 -NoRestore

      - name: Docker tests
        shell: pwsh
        run: ./eng/test-docker.ps1 -NoBuild
