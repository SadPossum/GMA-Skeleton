name: Docker Tests

on:
  pull_request:
    paths:
      - '.github/workflows/docker-tests.yml'
      - 'docker-compose.yml'
      - 'eng/test-docker.ps1'
      - 'tests/Integration.Tests/**'
      - 'src/**'
      - 'gma/framework'
      - 'gma/extensions'
      - 'gma/modules/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-tests.yml'
      - 'docker-compose.yml'
      - 'eng/test-docker.ps1'
      - 'tests/Integration.Tests/**'
      - 'src/**'
      - 'gma/framework'
      - 'gma/extensions'
      - 'gma/modules/**'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-tests-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  GMA_REQUIRE_DOCKER_TESTS: 'true'

jobs:
  docker:
    name: Docker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout skeleton
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Show Docker version
        shell: pwsh
        run: docker version

      - name: Check GMA submodule dev heads
        shell: pwsh
        run: ./eng/check-submodule-dev-heads.ps1

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/gma-bootstrap.ps1 -SourceLayout GmaSubmodules -Force

      - name: Restore
        shell: pwsh
        run: ./eng/restore.ps1

      - name: Build
        shell: pwsh
        run: ./eng/build.ps1 -NoRestore

      - name: Docker tests
        shell: pwsh
        run: ./eng/test-docker.ps1 -NoBuild
