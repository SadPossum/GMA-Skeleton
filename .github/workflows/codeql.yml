name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '13 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze composed C# source
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout complete source set
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GMA_CI_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: csharp
          build-mode: manual

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/gma-bootstrap.ps1 -SourceLayout GmaSubmodules -Force

      - name: Restore
        shell: pwsh
        run: ./eng/restore.ps1

      - name: Build composed source
        shell: pwsh
        run: ./eng/build.ps1 -NoRestore

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: /language:csharp
